<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Value calculation flow</title>
<desc>How pet base value is multiplied by attributes to produce final trade value</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="40" y="120" width="110" height="80" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="95" y="153" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Pet selected</text>
<text x="95" y="171" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">e.g. Parrot</text>
<text x="95" y="187" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">base value: 22.0</text>

<rect x="200" y="40" width="120" height="56" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="260" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Fly / Ride</text>
<text x="260" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">x1.5 – x2.0</text>

<rect x="200" y="132" width="120" height="56" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="260" y="156" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Neon</text>
<text x="260" y="174" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#085041">x4.0</text>

<rect x="200" y="224" width="120" height="56" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="260" y="248" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Mega</text>
<text x="260" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#712B13">x16.0 – x20.0</text>

<line x1="150" y1="160" x2="198" y2="68" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="150" y1="160" x2="198" y2="160" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="150" y1="160" x2="198" y2="252" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<line x1="320" y1="68" x2="438" y2="140" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="320" y1="160" x2="438" y2="160" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="320" y1="252" x2="438" y2="180" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="440" y="100" width="120" height="120" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="500" y="148" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">Final value</text>
<text x="500" y="168" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0C447C">sum per side</text>
<text x="500" y="186" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0C447C">compared</text>
<text x="500" y="204" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0C447C">verdict shown</text>

<text x="340" y="310" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888780">Multipliers stack based on active attributes</text>
</svg>
